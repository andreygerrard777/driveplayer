<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.header{padding:6px 18px 0;display:flex;align-items:center}
.header-icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center}

.progress-wrap{margin-bottom:2px}

.fs-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#08080d;z-index:100;display:flex;flex-direction:column;align-items:center;padding:0;overflow:hidden;animation:slideUp .3s ease}

<body>
<div class="app" id="app"></div>

<script>
const CLIENT_ID = "209122708626-qoeaortdav3mmqcjb1vscocbhanpvs6a.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/drive.readonly";
const ROOT_FOLDER = "Mixadance";
const DRIVE = "https://www.googleapis.com/drive/v3";
const CACHE_KEY = "dp_tracks_cache";
const FAV_KEY = "dp_favorites";
const TOKEN_KEY = "dp_token";
const TOKEN_EXP_KEY = "dp_token_exp";
const LAST_TRACK_KEY = "dp_last_track";

let token = null;
let tokenExpiry = 0;
let allTracks = [];
let folders = {};
let folderNames = [];
let currentTrack = null;
let isPlaying = false;
let favorites = new Map(); // id -> timestamp
let shuffleOn = false;
let repeatMode = 0;
let sortBy = "default";
let favSortBy = "recent"; // "recent" or "title"
let tab = "songs";
let openFolder = null;
let search = "";
let blobUrl = null;
let isBuffering = false;
let fsOpen = false;
let activePlaylist = null; // locked playlist for next/prev
let currentAbort = null; // AbortController for current fetch
const scrollPositions = {}; // tab -> scrollTop
const audio = new Audio();

// --- PERSISTENCE ---
function saveFavorites() {
  try { localStorage.setItem(FAV_KEY, JSON.stringify([...favorites.entries()])); } catch(e) {}
}
function loadFavorites() {
  try {
    const d = localStorage.getItem(FAV_KEY);
    if (!d) return;
    const parsed = JSON.parse(d);
    if (parsed.length && Array.isArray(parsed[0])) {
      favorites = new Map(parsed);
    } else {
      // Migration from old Set format
      favorites = new Map(parsed.map((id, i) => [id, Date.now() - (parsed.length - i) * 1000]));
      saveFavorites();
    }
  } catch(e) {}
}
function saveCache() {
  try {
    const data = { folders, folderNames, allTracks: allTracks.map(t=>({id:t.id,fileName:t.fileName,folder:t.folder,folderNum:t.folderNum,trackNum:t.trackNum,driveId:t.driveId})), ts: Date.now() };
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
  } catch(e) {}
}
function loadCache() {
  try {
    const d = localStorage.getItem(CACHE_KEY);
    if (!d) return false;
    const data = JSON.parse(d);
    // Cache valid for 24 hours
    if (Date.now() - data.ts > 24*60*60*1000) return false;
    folders = data.folders;
    folderNames = data.folderNames;
    allTracks = data.allTracks;
    if (allTracks.length) currentTrack = allTracks[0];
    return true;
  } catch(e) { return false; }
}
function saveToken(t, expiresIn) {
  token = t;
  tokenExpiry = Date.now() + (expiresIn - 60) * 1000; // refresh 60s before expiry
  try {
    localStorage.setItem(TOKEN_KEY, t);
    localStorage.setItem(TOKEN_EXP_KEY, tokenExpiry.toString());
  } catch(e) {}
}
function loadToken() {
  try {
    const t = localStorage.getItem(TOKEN_KEY);
    const exp = parseInt(localStorage.getItem(TOKEN_EXP_KEY) || "0");
    if (t && exp > Date.now()) { token = t; tokenExpiry = exp; return true; }
  } catch(e) {}
  return false;
}
function clearToken() {
  token = null; tokenExpiry = 0;
  try { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXP_KEY); } catch(e) {}
}
function saveLastTrack() {
  if (!currentTrack) return;
  try { localStorage.setItem(LAST_TRACK_KEY, currentTrack.id); } catch(e) {}
}
function loadLastTrack() {
  try {
    const id = localStorage.getItem(LAST_TRACK_KEY);
    if (id) { const t = allTracks.find(x=>x.id===id); if(t) currentTrack=t; }
  } catch(e) {}
}
function updateMediaSession() {
  if (!('mediaSession' in navigator) || !currentTrack) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: displayName(currentTrack),
    artist: currentTrack.folder,
    album: ROOT_FOLDER,
  });
  navigator.mediaSession.setActionHandler('play', ()=>{ audio.play(); isPlaying=true; renderPlayer(); });
  navigator.mediaSession.setActionHandler('pause', ()=>{ audio.pause(); isPlaying=false; renderPlayer(); });
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
  navigator.mediaSession.setActionHandler('seekbackward', ()=>{ audio.currentTime=Math.max(0,audio.currentTime-15); });
  navigator.mediaSession.setActionHandler('seekforward', ()=>{ audio.currentTime=Math.min(audio.duration||0,audio.currentTime+15); });
}

// Check token validity before API calls
async function ensureToken() {
  if (token && tokenExpiry > Date.now()) return true;
  // Token expired — need re-auth
  clearToken();
  showLogin("Сесія закінчилась. Увійдіть знову.");
  return false;
}

// --- SVG ICONS ---
const IC = {
  music:'<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>',
  play:'<path d="M8 5v14l11-7z"/>',
  pause:'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>',
  next:'<path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>',
  prev:'<path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>',
  search:'<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>',
  folder:'<path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>',
  heart:'<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>',
  shuffle:'<path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>',
  repeat:'<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>',
  repeatOne:'<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zM13 15V9h-1l-2 1v1h1.5v4z"/>',
  sort:'<path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/>',
  drive:'<path d="M7.71 3.5L1.15 15l4.58 6L12.29 9.5 7.71 3.5zm8.58 0H8.29l6.86 12h7.99L16.29 3.5zM2 16.5l3.71 6.5h12.58l3.71-6.5H2z"/>',
  refresh:'<path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>',
};

const svg = (icon, size=20, fill="currentColor", extra="") => `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" ${extra}>${IC[icon]}</svg>`;

const GRADS = [
  "linear-gradient(135deg,#6366f1,#a855f7)","linear-gradient(135deg,#ec4899,#f43f5e)",
  "linear-gradient(135deg,#3b82f6,#06b6d4)","linear-gradient(135deg,#10b981,#34d399)",
  "linear-gradient(135deg,#f59e0b,#ef4444)","linear-gradient(135deg,#8b5cf6,#ec4899)",
  "linear-gradient(135deg,#f97316,#eab308)","linear-gradient(135deg,#06b6d4,#6366f1)",
  "linear-gradient(135deg,#14b8a6,#0ea5e9)","linear-gradient(135deg,#e11d48,#be123c)",
  "linear-gradient(135deg,#7c3aed,#2563eb)","linear-gradient(135deg,#ea580c,#dc2626)",
  "linear-gradient(135deg,#059669,#0d9488)","linear-gradient(135deg,#d946ef,#6366f1)",
  "linear-gradient(135deg,#ca8a04,#ea580c)","linear-gradient(135deg,#4f46e5,#7c3aed)",
];
const grad = (s) => { let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h); return GRADS[Math.abs(h)%GRADS.length]; };

const natSort = (a,b) => {
  const ax=[],bx=[];
  a.replace(/(\d+)|(\D+)/g,(_,$1,$2)=>{ax.push([$1||Infinity,$2||""])});
  b.replace(/(\d+)|(\D+)/g,(_,$1,$2)=>{bx.push([$1||Infinity,$2||""])});
  while(ax.length&&bx.length){const an=ax.shift(),bn=bx.shift(),n=(parseInt(an[0])-parseInt(bn[0]))||an[1].localeCompare(bn[1]);if(n)return n}
  return ax.length-bx.length;
};

const fmt = s => {if(!s||isNaN(s))return"0:00";return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`};
const displayName = t => t.fileName.toLowerCase().startsWith('mixadance')?t.fileName:'Mixadance_'+t.fileName;

// --- DRIVE API ---
async function driveList(query) {
  if (!await ensureToken()) throw new Error("Не авторизовано");
  let all=[],pt=null;
  do {
    const u=new URL(DRIVE+"/files");
    u.searchParams.set("q",query);
    u.searchParams.set("fields","nextPageToken,files(id,name)");
    u.searchParams.set("pageSize","1000");
    u.searchParams.set("spaces","drive");
    if(pt) u.searchParams.set("pageToken",pt);
    const r=await fetch(u,{headers:{Authorization:`Bearer ${token}`}});
    if(r.status===401) { clearToken(); showLogin("Сесія закінчилась"); throw new Error("401"); }
    if(!r.ok) throw new Error(`API ${r.status}`);
    const d=await r.json();
    all=all.concat(d.files||[]);
    pt=d.nextPageToken;
  } while(pt);
  return all;
}

// --- OAUTH ---
function doAuth() {
  const redirect = window.location.origin + window.location.pathname;
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=${encodeURIComponent(SCOPES)}&include_granted_scopes=true`;
  window.location.href = url;
}

function checkToken() {
  const hash = window.location.hash.substring(1);
  if (hash) {
    const params = new URLSearchParams(hash);
    const t = params.get("access_token");
    const expiresIn = parseInt(params.get("expires_in") || "3600");
    if (t) {
      saveToken(t, expiresIn);
      window.location.hash = "";
      return true;
    }
  }
  return loadToken();
}

// --- SCAN DRIVE ---
async function scanDrive(forceRescan) {
  if (!forceRescan && loadCache()) {
    loadFavorites();
    loadLastTrack();
    renderMain();
    // Background rescan to update cache silently
    setTimeout(() => bgRescan(), 3000);
    return;
  }

  showLoading("Пошук папки Mixadance...");
  const roots = await driveList(`name='${ROOT_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  if (!roots.length) { showError(`Папку "${ROOT_FOLDER}" не знайдено`); return; }
  const rootId = roots[0].id;

  showLoading("Сканування підпапок...");
  const subs = await driveList(`'${rootId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  subs.sort((a,b) => natSort(a.name,b.name));
  showLoading(`${subs.length} папок. Завантаження треків...`);

  const AQ = "(mimeType='audio/mpeg' or mimeType='audio/mp3' or mimeType='audio/flac' or mimeType='audio/ogg' or mimeType='audio/wav' or mimeType='audio/x-wav' or mimeType='audio/aac' or mimeType='audio/mp4')";
  folders = {};
  folderNames = [];
  let total = 0;

  const rf = await driveList(`'${rootId}' in parents and ${AQ} and trashed=false`);
  if (rf.length) {
    rf.sort((a,b)=>natSort(a.name,b.name));
    folders[ROOT_FOLDER] = rf.map((f,i)=>({id:f.id,fileName:f.name,folder:ROOT_FOLDER,folderNum:0,trackNum:i+1,driveId:f.id}));
    folderNames.push(ROOT_FOLDER);
    total += rf.length;
  }

  for (let i=0; i<subs.length; i++) {
    if (i%5===0) showLoading(`Сканування ${i+1}/${subs.length}... (${total} треків)`);
    const files = await driveList(`'${subs[i].id}' in parents and ${AQ} and trashed=false`);
    if (files.length) {
      files.sort((a,b)=>natSort(a.name,b.name));
      const nm = subs[i].name.match(/(\d+)/);
      const fn = nm ? parseInt(nm[1]) : 0;
      folders[subs[i].name] = files.map((f,idx)=>({id:f.id,fileName:f.name,folder:subs[i].name,folderNum:fn,trackNum:idx+1,driveId:f.id}));
      folderNames.push(subs[i].name);
      total += files.length;
    }
  }

  folderNames.sort(natSort);
  allTracks = folderNames.flatMap(n=>folders[n]);
  if (allTracks.length) currentTrack = allTracks[0];
  saveCache();
  loadFavorites();
  loadLastTrack();
  renderMain();
}

// Background rescan without UI blocking
async function bgRescan() {
  try {
    if (!await ensureToken()) return;
    const roots = await driveList(`name='${ROOT_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    if (!roots.length) return;
    const rootId = roots[0].id;
    const subs = await driveList(`'${rootId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const AQ = "(mimeType='audio/mpeg' or mimeType='audio/mp3' or mimeType='audio/flac' or mimeType='audio/ogg' or mimeType='audio/wav' or mimeType='audio/x-wav' or mimeType='audio/aac' or mimeType='audio/mp4')";
    let newFolders = {};
    let newNames = [];
    let total = 0;

    const rf = await driveList(`'${rootId}' in parents and ${AQ} and trashed=false`);
    if (rf.length) {
      rf.sort((a,b)=>natSort(a.name,b.name));
      newFolders[ROOT_FOLDER] = rf.map((f,i)=>({id:f.id,fileName:f.name,folder:ROOT_FOLDER,folderNum:0,trackNum:i+1,driveId:f.id}));
      newNames.push(ROOT_FOLDER);
      total += rf.length;
    }
    for (const sf of subs) {
      const files = await driveList(`'${sf.id}' in parents and ${AQ} and trashed=false`);
      if (files.length) {
        files.sort((a,b)=>natSort(a.name,b.name));
        const nm = sf.name.match(/(\d+)/);
        newFolders[sf.name] = files.map((f,idx)=>({id:f.id,fileName:f.name,folder:sf.name,folderNum:nm?parseInt(nm[1]):0,trackNum:idx+1,driveId:f.id}));
        newNames.push(sf.name);
        total += files.length;
      }
    }
    newNames.sort(natSort);
    // Only update if changed
    if (total !== allTracks.length) {
      folders = newFolders;
      folderNames = newNames;
      allTracks = folderNames.flatMap(n=>folders[n]);
      if (!currentTrack && allTracks.length) currentTrack = allTracks[0];
      saveCache();
      renderMain();
    }
  } catch(e) { console.log("bgRescan error:", e); }
}

// --- PLAYBACK ---
let playGeneration = 0;

async function playTrack(track, playlist) {
  const gen = ++playGeneration;
  
  // Cancel ongoing fetch for previous track
  if (currentAbort) { currentAbort.abort(); currentAbort = null; }
  
  // Stop playback but keep blob alive until new one is ready
  audio.pause();
  const oldBlobUrl = blobUrl;
  blobUrl = null;
  
  currentTrack = track;
  isPlaying = true;
  isBuffering = true;
  saveLastTrack();
  if (playlist) activePlaylist = [...playlist];
  
  const scrollEl = document.querySelector('.content');
  const scrollPos = scrollEl ? scrollEl.scrollTop : 0;
  renderMain();
  requestAnimationFrame(() => { const el = document.querySelector('.content'); if(el) el.scrollTop = scrollPos; });
  if (fsOpen) buildFullscreen();
  
  // Reset progress display
  const pBar = document.getElementById("pf");
  const ctEl = document.getElementById("ct");
  const dtEl = document.getElementById("dt");
  if (pBar) pBar.style.width = "0%";
  if (ctEl) ctEl.textContent = "0:00";
  if (dtEl) dtEl.textContent = "0:00";
  
  const abort = new AbortController();
  currentAbort = abort;
  
  try {
    if (!await ensureToken()) return;
    if (gen !== playGeneration) return;
    
    // Check if this track was preloaded
    if (preloadedBlob && preloadedId === track.driveId) {
      if (oldBlobUrl) URL.revokeObjectURL(oldBlobUrl);
      blobUrl = URL.createObjectURL(preloadedBlob);
      preloadedBlob = null;
      preloadedId = null;
      audio.src = blobUrl;
      isBuffering = false;
      renderPlayer();
      if (fsOpen) updateFsArt();
      try { await audio.play(); } catch(e) { isPlaying=false; renderPlayer(); }
      if (gen !== playGeneration) { audio.pause(); return; }
      updateMediaSession();
      if (!shuffleOn) { preloadNext(); }
      return;
    }
    
    const r = await fetch(`${DRIVE}/files/${track.driveId}?alt=media`, {
      headers: {Authorization: `Bearer ${token}`},
      signal: abort.signal
    });
    if (gen !== playGeneration || abort.signal.aborted) return;
    if (r.status===401) { clearToken(); showLogin("Сесія закінчилась"); return; }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const blob = await r.blob();
    if (gen !== playGeneration || abort.signal.aborted) return;
    
    // Now swap: revoke old, set new
    if (oldBlobUrl) URL.revokeObjectURL(oldBlobUrl);
    blobUrl = URL.createObjectURL(blob);
    audio.src = blobUrl;
    isBuffering = false;
    renderPlayer();
    if (fsOpen) updateFsArt();
    
    try {
      await audio.play();
    } catch(playErr) {
      console.log("Autoplay blocked:", playErr.message);
      isPlaying = false;
      renderPlayer();
      if (fsOpen) updateFsArt();
    }
    if (gen !== playGeneration) { audio.pause(); return; }
    updateMediaSession();
    // Preload next
    if (!shuffleOn) { preloadedBlob = null; preloadedId = null; preloadNext(); }
  } catch(e) {
    if (e.name === 'AbortError' || gen !== playGeneration) return;
    console.error(e);
    isPlaying = false;
    isBuffering = false;
    renderPlayer();
    if (fsOpen) updateFsArt();
  }
}

// Preload next track in background for faster switching
let preloadedBlob = null;
let preloadedId = null;
let preloadAbort = null;

function preloadNext() {
  const list = activePlaylist && activePlaylist.length ? activePlaylist : getPlaylist();
  if (!list.length || !currentTrack || !token) return;
  const idx = list.findIndex(t=>t.id===currentTrack.id);
  if (idx === -1) return;
  const nextIdx = (idx+1) % list.length;
  const nextT = list[nextIdx];
  if (!nextT || nextT.driveId === preloadedId || nextT.id === currentTrack.id) return;
  
  // Cancel previous preload
  if (preloadAbort) preloadAbort.abort();
  preloadAbort = new AbortController();
  
  fetch(`${DRIVE}/files/${nextT.driveId}?alt=media`, {
    headers:{Authorization:`Bearer ${token}`},
    signal: preloadAbort.signal
  })
    .then(r => { if(r.ok) return r.blob(); throw new Error('fail'); })
    .then(blob => { preloadedBlob = blob; preloadedId = nextT.driveId; })
    .catch(() => {});
}

// Update active track highlight and thumbnails
function renderActiveTrack() {
  document.querySelectorAll('.track-row').forEach(row => {
    const id = row.dataset.trackId;
    const isAct = id === currentTrack?.id;
    const thumb = row.querySelector('.track-thumb');
    if (isAct) {
      row.classList.add('active');
      if (thumb && isPlaying) {
        thumb.innerHTML = `<div class="eq-bars"><div class="eq-bar" style="animation:eq0 .65s ease infinite"></div><div class="eq-bar" style="animation:eq1 .65s ease infinite .15s"></div><div class="eq-bar" style="animation:eq2 .65s ease infinite .1s"></div></div>`;
      }
    } else {
      row.classList.remove('active');
      if (thumb && thumb.querySelector('.eq-bars')) {
        // Restore track number
        const t = allTracks.find(x=>x.id===id);
        if (t) {
          const num = tab==="favorites" ? ([...document.querySelectorAll('.track-row')].indexOf(row)+1) : t.trackNum;
          thumb.innerHTML = `<span class="track-num">${num}</span>`;
        }
      }
    }
  });
}

audio.addEventListener("timeupdate", () => {
  const bar = document.getElementById("pf");
  const ct = document.getElementById("ct");
  if (bar && audio.duration) {
    const pct = audio.currentTime/audio.duration;
    bar.style.width = (pct*100)+"%";
    if(ct) ct.textContent = fmt(audio.currentTime);
  }
  if (fsOpen) updateFsProgress();
});
audio.addEventListener("loadedmetadata", () => {
  const dt = document.getElementById("dt");
  if(dt) dt.textContent = fmt(audio.duration);
  if (fsOpen) updateFsProgress();
});
audio.addEventListener("ended", () => {
  if (repeatMode===2) { audio.currentTime=0; audio.play(); }
  else nextTrack();
});

function getPlaylist() {
  if (tab==="favorites") {
    let s = allTracks.filter(t=>favorites.has(t.id));
    if (favSortBy==="title") s.sort((a,b)=>natSort(displayName(a).toLowerCase(),displayName(b).toLowerCase()));
    else s.sort((a,b)=>(favorites.get(b.id)||0)-(favorites.get(a.id)||0));
    return s;
  }
  if (tab==="folders" && openFolder) return folders[openFolder]||[];
  return allTracks;
}

function nextTrack() {
  const list = activePlaylist && activePlaylist.length ? activePlaylist : getPlaylist();
  if (!list.length) return;
  if (repeatMode===2) { audio.currentTime=0; audio.play(); return; }
  let next;
  if (shuffleOn) {
    const others = list.filter(t=>t.id!==currentTrack?.id);
    next = others.length ? others[Math.floor(Math.random()*others.length)] : list[0];
  } else {
    const idx = list.findIndex(t=>t.id===currentTrack?.id);
    const ni = (idx+1)%list.length;
    if (ni===0 && repeatMode===0) { isPlaying=false; renderPlayer(); return; }
    next = list[ni];
  }
  
  // Use preloaded blob if available for this track
  if (preloadedBlob && preloadedId === next.driveId) {
    const gen = ++playGeneration;
    if (currentAbort) { currentAbort.abort(); currentAbort = null; }
    audio.pause();
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    
    currentTrack = next;
    isPlaying = true;
    isBuffering = false;
    saveLastTrack();
    activePlaylist = [...list];
    
    blobUrl = URL.createObjectURL(preloadedBlob);
    preloadedBlob = null;
    preloadedId = null;
    audio.src = blobUrl;
    
    const scrollEl = document.querySelector('.content');
    const scrollPos = scrollEl ? scrollEl.scrollTop : 0;
    renderMain();
    requestAnimationFrame(() => { const el = document.querySelector('.content'); if(el) el.scrollTop = scrollPos; });
    if (fsOpen) buildFullscreen();
    
    audio.play().then(() => {
      updateMediaSession();
      preloadNext();
    }).catch(() => { isPlaying=false; renderPlayer(); });
    return;
  }
  
  preloadedBlob = null;
  preloadedId = null;
  playTrack(next, list);
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime=0; return; }
  const list = activePlaylist && activePlaylist.length ? activePlaylist : getPlaylist();
  if (!list.length) return;
  const idx = list.findIndex(t=>t.id===currentTrack?.id);
  playTrack(list[(idx-1+list.length)%list.length], list);
}

function togglePlay() {
  if (isPlaying) { audio.pause(); isPlaying=false; }
  else { if(audio.src){audio.play();isPlaying=true} else if(currentTrack) playTrack(currentTrack); }
  renderPlayer();
}

  if (isBuffering) {

        <div class="player-sub">${currentTrack.folder} · ${timeShow} / ${durShow}</div>
      </div>
      <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${currentTrack.id}')" style="padding:4px">${isFav?`<svg width="18" height="18" viewBox="0 0 24 24" fill="#ec4899">${IC.heart}</svg>`:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3a3650" stroke-width="2">${IC.heart}</svg>`}</button>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="shuffleOn=!shuffleOn;renderPlayer()">${svg('shuffle',16,shuffleOn?'#6366f1':'#3a3650')}</button>
      <button class="ctrl-btn" onclick="audio.currentTime=Math.max(0,audio.currentTime-15)">
        <div style="position:relative;width:28px;height:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12.5 8V4l-4 4 4 4V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4.5c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="#8a86a0"/></svg>
          <span style="font-size:7px;font-weight:700;color:#c8c4d8;margin-top:-2px">15s</span>
        </div>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()">${svg('prev',20,'#c8c4d8')}</button>
      <button class="play-btn" onclick="togglePlay()">${svg(isPlaying?'pause':'play',22,'#fff')}</button>
      <button class="ctrl-btn" onclick="nextTrack()">${svg('next',20,'#c8c4d8')}</button>
      <button class="ctrl-btn" onclick="audio.currentTime=Math.min(audio.duration||0,audio.currentTime+15)">
        <div style="position:relative;width:28px;height:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M11.5 8V4l4 4-4 4V8c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z" fill="#8a86a0"/></svg>
          <span style="font-size:7px;font-weight:700;color:#c8c4d8;margin-top:-2px">15s</span>
        </div>
      </button>
      <button class="ctrl-btn" onclick="repeatMode=(repeatMode+1)%3;renderPlayer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="${repCol}">${repIc}</svg></button>
    </div>
  </div>`;
}

function seekAudio(e) {
  const bar = document.getElementById("pb");
  if (!bar || !audio.duration) return;
  const r = bar.getBoundingClientRect();
  audio.currentTime = Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)) * audio.duration;
}

function seekTouch(e) {
  e.preventDefault();
  const bar = document.getElementById("pb");
  if (!bar || !audio.duration) return;
  const r = bar.getBoundingClientRect();
  audio.currentTime = Math.max(0,Math.min(1,(e.touches[0].clientX-r.left)/r.width)) * audio.duration;
}

// Mouse drag for progress bar
document.addEventListener('mousedown', function(e) {
  const bar = document.getElementById("pb");
  if (!bar || !audio.duration) return;
  const r = bar.getBoundingClientRect();
  if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top - 10 && e.clientY <= r.bottom + 10) {
    const seek = (ev) => {
      audio.currentTime = Math.max(0, Math.min(1, (ev.clientX - r.left) / r.width)) * audio.duration;
    };
    seek(e);
    const onMove = (ev) => { ev.preventDefault(); seek(ev); };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }
});

function playTrackById(id) {
  const t = allTracks.find(x => x.id === id);
  if (t) {
    const pl = getPlaylist();
    playTrack(t, pl);
  }
}

function switchTab(newTab) {
  // Save current scroll
  const scrollEl = document.querySelector('.content');
  const tabKey = tab + (openFolder ? ':' + openFolder : '');
  if (scrollEl) scrollPositions[tabKey] = scrollEl.scrollTop;
  tab = newTab;
  openFolder = null;
  renderMain();
  // Restore scroll for new tab
  requestAnimationFrame(() => {
    const el = document.querySelector('.content');
    const key = newTab;
    if (el && scrollPositions[key]) el.scrollTop = scrollPositions[key];
  });
}

// --- FULLSCREEN PLAYER ---
function openFullscreen() {
  if (!currentTrack) return;
  fsOpen = true;
  buildFullscreen();
}

function closeFullscreen() {
  const overlay = document.getElementById('fs');
  if (overlay) {
    overlay.style.transition = 'transform .25s ease, opacity .25s ease';
    overlay.style.transform = 'translateY(100%)';
    overlay.style.opacity = '0';
    setTimeout(() => { fsOpen = false; overlay.remove(); }, 250);
  } else { fsOpen = false; }
}

function buildFullscreen() {
  if (!fsOpen || !currentTrack) return;
  let overlay = document.getElementById('fs');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'fs';
    overlay.className = 'fs-overlay';
    document.body.appendChild(overlay);
  }

  const isFav = favorites.has(currentTrack.id);
  const repCol = ["#4a4660","#6366f1","#ec4899"][repeatMode];
  const repIcon = repeatMode===2 ? IC.repeatOne : IC.repeat;

  overlay.innerHTML = `
    <div id="fs-swipe-zone" style="width:100%;display:flex;flex-direction:column;align-items:center;padding-top:6px">
      <div id="fs-close-bar" style="width:100%;display:flex;justify-content:center;padding:10px 0 14px;cursor:pointer">
        <div style="width:50px;height:5px;background:#4a4660;border-radius:3px"></div>
      </div>
      <div class="fs-art" id="fs-art" style="background:#000;overflow:hidden">
        <img src="mixadance_cover.png" style="width:100%;height:100%;object-fit:contain;border-radius:20px" onerror="this.parentElement.style.background='${grad(currentTrack.folder)}';this.outerHTML='<span style=\\'font-size:64px;opacity:.6\\'>♪</span>'">
      </div>
    </div>
    <div style="width:100%;max-width:380px;margin:0 auto;padding:16px 28px 28px;display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:100%;text-align:center">
        <div class="fs-title">${displayName(currentTrack)}</div>
        <div class="fs-sub">${currentTrack.folder}</div>
      </div>
      <div style="width:100%">
        <div id="fs-bar" style="width:100%;height:32px;display:flex;align-items:center;cursor:pointer;touch-action:none">
          <div style="width:100%;height:6px;background:#1a1925;border-radius:3px;position:relative">
            <div id="fs-fill" style="height:100%;background:linear-gradient(90deg,#6366f1,#a855f7);border-radius:3px;position:relative;width:0%">
              <div style="position:absolute;right:-8px;top:-5px;width:16px;height:16px;border-radius:50%;background:#e4e1f0;box-shadow:0 0 10px #6366f188;border:2px solid #6366f1"></div>
            </div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:14px;color:#c8c4d8;font-weight:600;font-variant-numeric:tabular-nums"><span id="fs-ct">0:00</span><span id="fs-dt">0:00</span></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:32px;padding:6px 0">
        <div id="fs-rw" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:6px;color:#8a86a0;-webkit-tap-highlight-color:transparent">
          <svg width="28" height="28" viewBox="0 0 24 24"><path d="M12.5 8V4l-4 4 4 4V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4.5c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="currentColor"/></svg>
          <span style="font-size:10px;font-weight:600;color:#c8c4d8">15s</span>
        </div>
        <div id="fs-fav" style="cursor:pointer;padding:6px;display:flex;-webkit-tap-highlight-color:transparent">
          ${isFav?`<svg width="34" height="34" viewBox="0 0 24 24" fill="#ec4899">${IC.heart}</svg>`:`<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#4a4660" stroke-width="2">${IC.heart}</svg>`}
        </div>
        <div id="fs-ff" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:6px;color:#8a86a0;-webkit-tap-highlight-color:transparent">
          <svg width="28" height="28" viewBox="0 0 24 24"><path d="M11.5 8V4l4 4-4 4V8c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z" fill="currentColor"/></svg>
          <span style="font-size:10px;font-weight:600;color:#c8c4d8">15s</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:4px;width:100%;padding:2px 0">
        <div id="fs-shuf" style="cursor:pointer;padding:12px;display:flex;-webkit-tap-highlight-color:transparent">${svg('shuffle',24,shuffleOn?'#6366f1':'#4a4660')}</div>
        <div id="fs-prev" style="cursor:pointer;padding:12px;display:flex;-webkit-tap-highlight-color:transparent">${svg('prev',34,'#c8c4d8')}</div>
        <div id="fs-pp" class="fs-play" style="-webkit-tap-highlight-color:transparent">${svg(isPlaying?'pause':'play',32,'#fff')}</div>
        <div id="fs-next" style="cursor:pointer;padding:12px;display:flex;-webkit-tap-highlight-color:transparent">${svg('next',34,'#c8c4d8')}</div>
        <div id="fs-rep" style="cursor:pointer;padding:12px;display:flex;-webkit-tap-highlight-color:transparent"><svg width="24" height="24" viewBox="0 0 24 24" fill="${repCol}">${repIcon}</svg></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;width:100%;padding:8px 0 2px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#4a4660"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <div id="fs-vol-bar" style="flex:1;height:32px;display:flex;align-items:center;cursor:pointer;touch-action:none">
          <div style="width:100%;height:5px;background:#1a1925;border-radius:3px;position:relative">
            <div id="fs-vol-fill" style="height:100%;background:linear-gradient(90deg,#6366f1,#a855f7);border-radius:3px;position:relative;width:${Math.round(audio.volume*100)}%">
              <div style="position:absolute;right:-7px;top:-5px;width:14px;height:14px;border-radius:50%;background:#e4e1f0;box-shadow:0 0 8px #6366f188;border:2px solid #6366f1"></div>
            </div>
          </div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#4a4660"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </div>
    </div>
  `;

  // Drag to dismiss - touch
  let dragStartY = 0;
  let isDraggingDown = false;
  
  overlay.addEventListener('touchstart', (e) => {
    if (e.touches[0].clientY < window.innerHeight * 0.5) {
      dragStartY = e.touches[0].clientY;
      isDraggingDown = true;
    }
  }, {passive: true});
  
  overlay.addEventListener('touchmove', (e) => {
    if (!isDraggingDown) return;
    const dy = e.touches[0].clientY - dragStartY;
    if (dy > 0) {
      overlay.style.transform = `translateY(${dy}px)`;
      overlay.style.opacity = Math.max(0.3, 1 - dy / 400);
    }
  }, {passive: true});
  
  overlay.addEventListener('touchend', (e) => {
    if (!isDraggingDown) return;
    isDraggingDown = false;
    const dy = e.changedTouches[0].clientY - dragStartY;
    if (dy > 120) { closeFullscreen(); }
    else { overlay.style.transform = ''; overlay.style.opacity = ''; }
  });

  // Drag to dismiss - mouse (for desktop)
  let mDragY = 0, mDragging = false;
  overlay.addEventListener('mousedown', (e) => {
    if (e.clientY < window.innerHeight * 0.5 && e.target.closest('#fs-bar,#fs-vol-bar') === null) {
      mDragY = e.clientY;
      mDragging = true;
      e.preventDefault();
    }
  });
  document.addEventListener('mousemove', (e) => {
    if (!mDragging) return;
    const dy = e.clientY - mDragY;
    if (dy > 0) {
      overlay.style.transform = `translateY(${dy}px)`;
      overlay.style.opacity = Math.max(0.3, 1 - dy / 400);
    }
  });
  document.addEventListener('mouseup', (e) => {
    if (!mDragging) return;
    mDragging = false;
    const dy = e.clientY - mDragY;
    if (dy > 120) { closeFullscreen(); }
    else { overlay.style.transform = ''; overlay.style.opacity = ''; }
  });

  // Button handlers
  const tap = (id, fn) => {
    const el = document.getElementById(id);
    if (!el) return;
    let touched = false;
    el.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); touched = true; fn(); }, false);
    el.addEventListener('click', (e) => { e.stopPropagation(); if (!touched) fn(); touched = false; }, false);
  };

  tap('fs-pp', () => {
    if (isPlaying) { audio.pause(); isPlaying=false; } 
    else { if(audio.src){audio.play();isPlaying=true;} else if(currentTrack){playTrack(currentTrack);return;} }
    renderPlayer();
    const b = document.getElementById('fs-pp');
    if (b) b.innerHTML = svg(isPlaying?'pause':'play',32,'#fff');
    updateFsArt();
  });

  tap('fs-prev', () => prevTrack());
  tap('fs-next', () => nextTrack());

  tap('fs-rw', () => { if(audio.duration) audio.currentTime = Math.max(0, audio.currentTime - 15); });
  tap('fs-ff', () => { if(audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 15); });

  tap('fs-fav', () => {
    if (!currentTrack) return;
    if (favorites.has(currentTrack.id)) favorites.delete(currentTrack.id);
    else favorites.set(currentTrack.id, Date.now());
    saveFavorites();
    const favEl = document.getElementById('fs-fav');
    const on = favorites.has(currentTrack.id);
    if (favEl) favEl.innerHTML = on
      ? `<svg width="34" height="34" viewBox="0 0 24 24" fill="#ec4899">${IC.heart}</svg>`
      : `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#4a4660" stroke-width="2">${IC.heart}</svg>`;
    renderPlayer();
  });

  tap('fs-shuf', () => { shuffleOn=!shuffleOn; buildFullscreen(); renderPlayer(); });
  tap('fs-rep', () => { repeatMode=(repeatMode+1)%3; buildFullscreen(); renderPlayer(); });

  // Seek bar - self-contained drag (no document-level listeners on mobile)
  const bar = document.getElementById('fs-bar');
  const doSeek = (cx) => {
    if (!audio.duration || !bar) return;
    const r = bar.getBoundingClientRect();
    audio.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * audio.duration;
  };
  bar.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); doSeek(e.touches[0].clientX); }, {passive:false});
  bar.addEventListener('touchmove', (e) => { e.preventDefault(); e.stopPropagation(); doSeek(e.touches[0].clientX); }, {passive:false});
  bar.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    doSeek(e.clientX);
    const mv = (ev) => doSeek(ev.clientX);
    const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
  });

  // Volume slider - completely separate from seek bar
  const volBar = document.getElementById('fs-vol-bar');
  const doVol = (cx) => {
    if (!volBar) return;
    const r = volBar.getBoundingClientRect();
    const v = Math.max(0, Math.min(1, (cx - r.left) / r.width));
    audio.volume = v;
    const fill = document.getElementById('fs-vol-fill');
    if (fill) fill.style.width = (v * 100) + '%';
  };
  volBar.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); doVol(e.touches[0].clientX); }, {passive:false});
  volBar.addEventListener('touchmove', (e) => { e.preventDefault(); e.stopPropagation(); doVol(e.touches[0].clientX); }, {passive:false});
  volBar.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    doVol(e.clientX);
    const mv = (ev) => doVol(ev.clientX);
    const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
  });

  updateFsProgress();
}

function updateFsProgress() {
  const fill = document.getElementById('fs-fill');
  const ct = document.getElementById('fs-ct');
  const dt = document.getElementById('fs-dt');
  if (fill && audio.duration) fill.style.width = (audio.currentTime/audio.duration*100)+"%";
  if (ct) ct.textContent = fmt(audio.currentTime);
  if (dt) dt.textContent = fmt(audio.duration);
}

function updateFsArt() {
  // Cover image is static, no need to update
}

function fsTogglePlay() {
  if (isPlaying) { audio.pause(); isPlaying=false; }
  else { if(audio.src){audio.play();isPlaying=true} else if(currentTrack){playTrack(currentTrack);return;} }
  renderPlayer();
  // Update play button and art without full rebuild
  const btn = document.getElementById('fs-pp');
  if (btn) btn.innerHTML = svg(isPlaying?'pause':'play',32,'#fff');
  updateFsArt();
}

function toggleFav(id) {
  const scrollEl = document.querySelector('.content');
  const scrollPos = scrollEl ? scrollEl.scrollTop : 0;
  if (favorites.has(id)) favorites.delete(id); else favorites.set(id, Date.now());
  saveFavorites();
  renderMain();
  requestAnimationFrame(() => {
    const el = document.querySelector('.content');
    if (el) el.scrollTop = scrollPos;
  });
}

// --- INIT ---
loadFavorites();
if (checkToken()) {
  scanDrive(false).catch(e => { console.error(e); showError(e.message); });
} else {
  showLogin();
}

// Token expiry checker — every minute
setInterval(() => {
  if (token && tokenExpiry <= Date.now()) {
    clearToken();
    if (!isPlaying) showLogin("Сесія закінчилась. Увійдіть знову.");
  }
}, 60000);
</script>
